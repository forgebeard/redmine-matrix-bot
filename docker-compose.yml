# =============================================================================
# Оркестрация: бот + PostgreSQL + постоянные тома.
#
# Postgres используется для хранения конфигурации и state бота.
#
# Конфигурация читается из Postgres (таблицы `bot_users` и маппинги роутинга).
#
# Запуск (из корня репозитория, после копирования и заполнения .env):
#   docker compose up --build -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — данные на именованном томе (переживает пересоздание контейнера).
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      # Значения по умолчанию можно переопределить в .env рядом с compose-файлом.
      POSTGRES_USER: ${POSTGRES_USER:-bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-redmine_matrix}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # Ждём готовности перед стартом бота (depends_on: condition).
      # $$ → один $ в shell контейнера (иначе compose подставит хостовые переменные).
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    # Порт наружу не пробрасываем по умолчанию (БД только для сети compose).
    # Для отладки с хоста публикуем только на localhost (DBeaver на ноуте).
    ports:
      - "127.0.0.1:5433:5432"

  # ---------------------------------------------------------------------------
  # Бот: собирается из Dockerfile в этом репозитории.
  # ---------------------------------------------------------------------------
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Важно: пароль может содержать зарезервированные URL-символы (например `]`, `/`, `+`),
      # поэтому используем URL-encoded версию, чтобы asyncpg/SQLAlchemy корректно распарсили DSN.
      # Если POSTGRES_PASSWORD_URLENC не задан — откат на raw.
      DATABASE_URL: postgresql://${POSTGRES_USER:-bot}:${POSTGRES_PASSWORD_URLENC:-${POSTGRES_PASSWORD}}@postgres:5432/${POSTGRES_DB:-redmine_matrix}
      # В clean-code режиме бот всегда читает конфиг и state из Postgres.
    volumes:
      # Логи bot.log (см. bot.py: data_dir) — переживают обновления образа.
      - ./data:/app/data
      # Явная подстановка .env в рабочий каталог для python-dotenv (load_dotenv).
      - ./.env:/app/.env:ro
    working_dir: /app
    healthcheck:
      # Отдельный процесс импортирует bot — проверка целостности образа и зависимостей.
      test: ["CMD", "python", "-c", "import bot"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 45s

  # ---------------------------------------------------------------------------
  # Ограниченный прокси к Docker API для admin runtime-control.
  # Не даём админке прямой доступ к raw docker.sock.
  # ---------------------------------------------------------------------------
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: 1
      GET: 1
      POST: 1
      DELETE: 0
      IMAGES: 0
      BUILD: 0
      EXEC: 0
      NETWORKS: 0
      NODES: 0
      SERVICES: 0
      SWARM: 0
      SYSTEM: 0

  # ---------------------------------------------------------------------------
  # Админка (FastAPI): таблицы bot_users, маршруты; миграции Alembic при старте.
  # ---------------------------------------------------------------------------
  admin:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_started
    env_file:
      - .env
    environment:
      # См. комментарий выше про URL-encoded пароль.
      DATABASE_URL: postgresql://${POSTGRES_USER:-bot}:${POSTGRES_PASSWORD_URLENC:-${POSTGRES_PASSWORD}}@postgres:5432/${POSTGRES_DB:-redmine_matrix}
      APP_MASTER_KEY_FILE: ${APP_MASTER_KEY_FILE:-/run/secrets/app_master_key}
      DOCKER_HOST: ${DOCKER_HOST:-tcp://docker-socket-proxy:2375}
      DOCKER_TARGET_SERVICE: ${DOCKER_TARGET_SERVICE:-bot}
      BOT_RUNTIME_STATUS_FILE: ${BOT_RUNTIME_STATUS_FILE:-/app/data/runtime_status.json}
    command:
      [
        "sh",
        "-c",
        "alembic upgrade head && exec uvicorn admin_main:app --host 0.0.0.0 --port 8080",
      ]
    ports:
      - "${ADMIN_PORT:-8080}:8080"
    # Для production предпочтительно передавать ключ через secret manager
    # (Docker/K8s secrets) или env APP_MASTER_KEY, а не через bind-файл.
    working_dir: /app
    user: bot
    volumes:
      - ./data:/app/data:ro

volumes:
  postgres_data:
    driver: local
