# =============================================================================
# Оркестрация: бот + PostgreSQL + постоянные тома.
#
# Postgres используется для хранения конфигурации и state бота.
#
# Конфигурация читается из Postgres (таблицы `bot_users` и маппинги роутинга).
#
# При первом запуске автоматически генерируется .env с POSTGRES_PASSWORD
# и APP_MASTER_KEY (сервис init). После этого: docker compose up --build -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Init: генерирует .env с случайными credentials при первом запуске.
  # ---------------------------------------------------------------------------
  init:
    image: python:3.11-slim
    volumes:
      # Монтируем .env из хоста, чтобы init мог его создать/обновить.
      - ./.env:/app/.env
      # Монтируем скрипт инициализации.
      - ./scripts/init_env.py:/app/scripts/init_env.py:ro
    command: ["python", "/app/scripts/init_env.py"]
    # Init запускается один раз и завершается.
    restart: "no"

  # ---------------------------------------------------------------------------
  # PostgreSQL — данные на именованном томе (переживают пересоздание контейнера).
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      # Ждём завершения init перед стартом БД.
      init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      # Значения по умолчанию можно переопределить в .env рядом с compose-файлом.
      POSTGRES_USER: ${POSTGRES_USER:-bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_DB: ${POSTGRES_DB:-via}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # Ждём готовности перед стартом бота (depends_on: condition).
      # $$ → один $ в shell контейнера (иначе compose подставит хостовые переменные).
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    # Порт наружу не пробрасываем по умолчанию (БД только для сети compose).
    # Для отладки с хоста публикуем только на localhost (DBeaver на ноуте).
    ports:
      - "127.0.0.1:5433:5432"

  # ---------------------------------------------------------------------------
  # Миграции БД: одноразовый шаг перед стартом bot/admin.
  # ---------------------------------------------------------------------------
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    restart: "no"
    depends_on:
      init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-bot}:${POSTGRES_PASSWORD_URLENC:-${POSTGRES_PASSWORD}}@postgres:5432/${POSTGRES_DB:-via}
    command: ["alembic", "upgrade", "head"]
    working_dir: /app
    user: bot

  # ---------------------------------------------------------------------------
  # Бот: собирается из Dockerfile в этом репозитории.
  # ---------------------------------------------------------------------------
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      # Важно: пароль может содержать зарезервированные URL-символы (например `]`, `/`, `+`),
      # поэтому используем URL-encoded версию, чтобы asyncpg/SQLAlchemy корректно распарсили DSN.
      # Если POSTGRES_PASSWORD_URLENC не задан — откат на raw.
      DATABASE_URL: postgresql://${POSTGRES_USER:-bot}:${POSTGRES_PASSWORD_URLENC:-${POSTGRES_PASSWORD}}@postgres:5432/${POSTGRES_DB:-via}
      # В clean-code режиме бот всегда читает конфиг и state из Postgres.
    volumes:
      # Логи bot.log (см. bot.py: data_dir) — переживают обновления образа.
      - ./data:/app/data
      # Явная подстановка .env в рабочий каталог для python-dotenv (load_dotenv).
      - ./.env:/app/.env:ro
    working_dir: /app
    healthcheck:
      # Импорт точки входа (см. Dockerfile: WORKDIR /app + PYTHONPATH=/app/src).
      test: ["CMD", "python", "-c", "import src.bot.main"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 45s

  # ---------------------------------------------------------------------------
  # Ограниченный прокси к Docker API для admin runtime-control.
  # Не даём админке прямой доступ к raw docker.sock.
  # ---------------------------------------------------------------------------
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: 1
      GET: 1
      POST: 1
      DELETE: 0
      IMAGES: 0
      BUILD: 0
      EXEC: 0
      NETWORKS: 0
      NODES: 0
      SERVICES: 0
      SWARM: 0
      SYSTEM: 0

  # ---------------------------------------------------------------------------
  # Админка (FastAPI): таблицы bot_users, маршруты; миграции Alembic при старте.
  # ---------------------------------------------------------------------------
  admin:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      docker-socket-proxy:
        condition: service_started
    env_file:
      - .env
    environment:
      # См. комментарий выше про URL-encoded пароль.
      DATABASE_URL: postgresql://${POSTGRES_USER:-bot}:${POSTGRES_PASSWORD_URLENC:-${POSTGRES_PASSWORD}}@postgres:5432/${POSTGRES_DB:-via}
      # Мастер-ключ читается из .env (APP_MASTER_KEY), а не из файла.
      APP_MASTER_KEY: ${APP_MASTER_KEY:-}
      DOCKER_HOST: ${DOCKER_HOST:-tcp://docker-socket-proxy:2375}
      DOCKER_TARGET_SERVICE: ${DOCKER_TARGET_SERVICE:-bot}
      BOT_RUNTIME_STATUS_FILE: ${BOT_RUNTIME_STATUS_FILE:-/app/data/runtime_status.json}
    command:
      [
        "sh",
        "-c",
        "exec uvicorn src.admin.main:app --host 0.0.0.0 --port 8080",
      ]
    ports:
      - "${ADMIN_PORT:-8080}:8080"
    working_dir: /app
    user: bot
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      # rw: бот пишет runtime_status.json; админка дописывает строки [ADMIN] в лог событий (см. ADMIN_EVENTS_LOG_PATH).
      - ./data:/app/data
      # Монтируем .env для чтения/записи credentials через GUI.
      - ./.env:/app/.env
      # Монтируем шаблоны для быстрой разработки (без пересборки образа).
      - ./templates:/app/templates

volumes:
  postgres_data:
    driver: local
