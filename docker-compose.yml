# =============================================================================
# Оркестрация: бот + PostgreSQL + админка.
#
# Пароль суперпользователя Postgres не хранится в репозитории: при первом запуске
# одноразовый контейнер кладёт его в том ``postgres_password_vol``, тот же файл
# читают postgres, bot и admin (см. DATABASE_PASSWORD_FILE).
#
# Запуск из корня репозитория:
#   docker compose up --build -d
#
# Опционально: файл .env (не обязателен) — см. .env.example для ADMIN_PORT и т.д.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Одноразовая генерация пароля БД в именованном томе (идемпотентно).
  # ---------------------------------------------------------------------------
  postgres-password-init:
    image: alpine:3.19
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        apk add --no-cache openssl >/dev/null
        mkdir -p /out
        if [ ! -s /out/postgres_password ]; then
          openssl rand -hex 24 > /out/postgres_password
        fi
        # 700 на каталоге ломает чтение для user bot (uid 1000) в admin/bot.
        chmod 755 /out
        chmod 444 /out/postgres_password
    volumes:
      - postgres_password_vol:/out

  # ---------------------------------------------------------------------------
  # PostgreSQL — данные на именованном томе.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      postgres-password-init:
        condition: service_completed_successfully
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bot}
      POSTGRES_DB: ${POSTGRES_DB:-redmine_matrix}
      POSTGRES_PASSWORD_FILE: /run/db_password/postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_password_vol:/run/db_password:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "127.0.0.1:5433:5432"

  # ---------------------------------------------------------------------------
  # Бот
  # ---------------------------------------------------------------------------
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_PASSWORD_FILE: /run/db_password/postgres_password
      POSTGRES_USER: ${POSTGRES_USER:-bot}
      POSTGRES_DB: ${POSTGRES_DB:-redmine_matrix}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    volumes:
      - ./data:/app/data
      - postgres_password_vol:/run/db_password:ro
    working_dir: /app
    healthcheck:
      test: ["CMD", "python", "-c", "import bot"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 45s

  # ---------------------------------------------------------------------------
  # Прокси к Docker API для admin runtime-control.
  # ---------------------------------------------------------------------------
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: 1
      GET: 1
      POST: 1
      DELETE: 0
      IMAGES: 0
      BUILD: 0
      EXEC: 0
      NETWORKS: 0
      NODES: 0
      SERVICES: 0
      SWARM: 0
      SYSTEM: 0

  # ---------------------------------------------------------------------------
  # Админка: миграции при старте, затем uvicorn.
  # ---------------------------------------------------------------------------
  admin:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_started
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_PASSWORD_FILE: /run/db_password/postgres_password
      POSTGRES_USER: ${POSTGRES_USER:-bot}
      POSTGRES_DB: ${POSTGRES_DB:-redmine_matrix}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      APP_MASTER_KEY_FILE: ${APP_MASTER_KEY_FILE:-/run/secrets/app_master_key}
      DOCKER_HOST: ${DOCKER_HOST:-tcp://docker-socket-proxy:2375}
      DOCKER_TARGET_SERVICE: ${DOCKER_TARGET_SERVICE:-bot}
      BOT_RUNTIME_STATUS_FILE: ${BOT_RUNTIME_STATUS_FILE:-/app/data/runtime_status.json}
    command: ["/app/scripts/docker_admin_entry.sh"]
    ports:
      - "${ADMIN_PORT:-8080}:8080"
    working_dir: /app
    user: bot
    volumes:
      - ./data:/app/data
      - postgres_password_vol:/run/db_password:ro

volumes:
  postgres_data:
    driver: local
  postgres_password_vol:
    driver: local
