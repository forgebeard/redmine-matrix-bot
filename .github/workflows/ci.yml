# pytest + сборка Docker-образа и smoke-import (без реального Matrix/Redmine).
name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bot
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: via
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U bot -d via"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://bot:postgres@localhost:5432/via
      ADMIN_DISABLE_RATE_LIMITS: "1"
      PYTHONPATH: ${{ github.workspace }}/src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Generate APP_MASTER_KEY
        run: echo "APP_MASTER_KEY=$(python -c 'import secrets; print(secrets.token_urlsafe(24))')" >> $GITHUB_ENV
      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-test.txt
      - name: Ruff lint check
        run: python -m ruff check src/
      - name: Ruff format check
        run: python -m ruff format --check src/
      - name: mypy (type check — core files)
        run: PYTHONPATH=src python -m mypy src/bot/logic.py src/bot/scheduler.py src/bot/routing.py src/matrix_send.py src/config.py src/database/state_repo.py src/database/load_config.py --explicit-package-bases
      # DATABASE_URL + postgres service — интеграционные тесты (test_admin_routes_integration и др.)
      - name: pytest (unit + API, без Playwright)
        run: |
          alembic upgrade head
          python -m pytest tests/ -q --tb=short --ignore=tests/e2e --cov=src --cov-report=term-missing --cov-fail-under=50

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bot
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: via
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U bot -d via"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://bot:postgres@localhost:5432/via
      ADMIN_DISABLE_RATE_LIMITS: "1"
      PYTHONPATH: ${{ github.workspace }}/src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Generate APP_MASTER_KEY
        run: echo "APP_MASTER_KEY=$(python -c 'import secrets; print(secrets.token_urlsafe(24))')" >> $GITHUB_ENV
      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-test.txt
      - name: Migrate DB
        run: alembic upgrade head
      - name: Install Playwright Chromium
        run: python -m playwright install chromium
      - name: pytest e2e (Playwright)
        run: python -m pytest tests/e2e/ -q --tb=short
        # E2E не блокирует merge в PR: сценарии flaky на внешнем браузерном стеке.
        # Регулярный контроль — по nightly/manual прогонам и отдельной triage-очереди.
        continue-on-error: true

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docker build
        run: docker build -t matrix-bot-ci .
      - name: Import smoke test (bot + admin)
        # Согласовано с Dockerfile: WORKDIR=/app, PYTHONPATH=/app/src (см. комментарии в Dockerfile).
        run: |
          docker run --rm matrix-bot-ci python -c "import src.bot.main; print('bot ok')"
          docker run --rm matrix-bot-ci python -c "import src.admin.main; print('admin ok')"
