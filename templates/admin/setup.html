{% extends "base_auth.html" %}
{% block title %}Первичная настройка{% endblock %}
{% block content %}
  <h1>Первичная настройка</h1>
  <p class="muted">Создайте единственную учётную запись администратора панели.</p>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form class="form" method="post" action="/setup">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}"/>
    <div class="field">
      <label for="login">Логин</label>
      <input type="text" id="login" name="login" required autocomplete="username" minlength="3" maxlength="255"/>
    </div>
    <div class="field">
      <label for="password">Пароль</label>
      <input type="password" id="password" name="password" required autocomplete="new-password"/>
    </div>
    <div class="field">
      <label for="password_confirm">Подтверждение пароля</label>
      <input type="password" id="password_confirm" name="password_confirm" required autocomplete="new-password"/>
    </div>
    <button class="btn btn-primary" type="submit">Создать администратора</button>
  </form>
{% endblock %}
