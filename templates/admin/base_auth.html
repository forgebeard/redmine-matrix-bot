<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}Вход{% endblock %} — Matrix</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg-deep: #030712;
      --fg: #e5e7eb;
      --muted: #9ca3af;
      --cyan: #06b6d4;
      --cyan-dim: rgba(6, 182, 212, 0.15);
      --border: rgba(255, 255, 255, 0.08);
      --glass: rgba(255, 255, 255, 0.05);
      --danger: #f87171;
      --radius: 1rem;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, sans-serif;
      background: linear-gradient(145deg, #0f172a 0%, var(--bg-deep) 45%, #000 100%);
      color: var(--fg);
    }
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .auth-card {
      width: 100%;
      max-width: 36rem;
      padding: 2rem;
      border-radius: 1.5rem;
      background: var(--glass);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--border);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .logo {
      width: 4rem;
      height: 4rem;
      margin: 0 auto 1.25rem;
      border-radius: 1rem;
      background: linear-gradient(135deg, var(--cyan), #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
      font-weight: 700;
      color: #fff;
      box-shadow: 0 10px 40px rgba(6, 182, 212, 0.35);
    }
    h1 { margin: 0 0 0.5rem; font-size: 1.5rem; font-weight: 600; }
    .muted { color: var(--muted); font-size: 0.92rem; margin: 0 0 1rem; }
    .error { color: var(--danger); margin: 0.5rem 0; }
    label { display: block; font-weight: 500; font-size: 0.9rem; }
    .form {
      display: flex;
      flex-direction: column;
      gap: 1.125rem;
    }
    .form label { margin-top: 0; }
    .field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .field-hint {
      margin: 0;
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.45;
    }
    input, textarea, select {
      width: 100%;
      margin-top: 0;
      padding: 0.65rem 0.85rem;
      border-radius: 0.65rem;
      border: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.6);
      color: var(--fg);
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px var(--cyan-dim);
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.55rem 1rem;
      border-radius: 0.65rem;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 500;
      text-decoration: none;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--cyan), #0891b2);
      color: #fff;
      width: 100%;
      padding: 0.75rem;
    }
    .form > .btn-primary { margin-top: 0; }
    .btn-primary:hover { filter: brightness(1.08); }
    .btn:focus-visible {
      outline: 2px solid var(--cyan);
      outline-offset: 2px;
    }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--fg); border-color: var(--cyan); }
    .card { /* совместимость с вложенными блоками */ }
    .auth-links { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 1rem; font-size: 0.88rem; }
    .auth-links a { color: var(--cyan); text-decoration: none; }
    .auth-links a:hover { text-decoration: underline; }
  </style>
  {% if csrf_token is defined and csrf_token %}
  <meta name="csrf-token" content="{{ csrf_token }}"/>
  {% endif %}
  {% block head_extra %}{% endblock %}
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="logo" aria-hidden="true">M</div>
      {% block content %}{% endblock %}
    </div>
  </div>
  <script>
    document.body.addEventListener('htmx:configRequest', function (event) {
      var meta = document.querySelector('meta[name="csrf-token"]');
      if (meta && meta.content) {
        event.detail.headers['X-CSRF-Token'] = meta.content;
      }
    });
  </script>
</body>
</html>
