{% extends "auth/base_auth.html" %}
{% block title %}Новый пароль{% endblock %}
{% block content %}
  <h1>Установка нового пароля</h1>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form class="auth-form" method="post" action="/reset-password">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}"/>
    <div class="field">
      <label for="token">Токен</label>
      <input type="text" id="token" name="token" value="{{ token or '' }}" required/>
    </div>
    <div class="field">
      <label for="password">Новый пароль</label>
      <input type="password" id="password" name="password" required autocomplete="new-password"/>
    </div>
    <button class="btn btn-primary" type="submit">Сохранить пароль</button>
  </form>
{% endblock %}
