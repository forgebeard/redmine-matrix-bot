<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}Вход{% endblock %} — Via</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/admin/css/base.css?v={{ asset_version() }}"/>
  <link rel="stylesheet" href="/static/admin/css/auth.css?v={{ asset_version() }}"/>
  {% block head_extra %}{% endblock %}
</head>
<body class="auth-body">
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo auth-logo--via" aria-hidden="true">
        <svg class="auth-v-mark" width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">
          <path d="M4.3 5.2C4.95 6.15 5.45 7.1 6 8L12 18.85L18 8C18.55 7.1 19.05 6.15 19.7 5.2" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      {% block content %}{% endblock %}
    </div>
  </div>
</body>
</html>
