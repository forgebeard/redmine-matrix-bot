{% extends "base_auth.html" %}
{% block title %}Вход{% endblock %}
{% block content %}
  <h1>Вход в панель</h1>
  <p class="muted">Войдите по логину и паролю.</p>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form class="form" method="post" action="/login">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}"/>
    <div class="field">
      <label for="login">Логин</label>
      <input type="text" id="login" name="login" required autocomplete="username" autocapitalize="none" spellcheck="false"/>
    </div>
    <div class="field">
      <label for="password">Пароль</label>
      <input type="password" id="password" name="password" required autocomplete="current-password"/>
    </div>
    <button type="submit" class="btn btn-primary">Войти</button>
  </form>
  <p class="auth-links">
    <a href="/forgot-password">Забыли пароль?</a>
    {% if can_register_admin %}
    <a href="/setup">Зарегистрировать администратора</a>
    {% endif %}
  </p>
{% endblock %}
